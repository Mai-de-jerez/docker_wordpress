version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: wp-db
    restart: unless-stopped
    ports:
      - "3360:3306"
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: mai
      MYSQL_PASSWORD: mai1234
      MYSQL_ROOT_PASSWORD: mai1234
    volumes:
      - ./db_data:/var/lib/mysql
      - ./wordpress.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - wp-net

  wordpress:
    image: wordpress:latest
    container_name: wp-web
    restart: unless-stopped
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: mai
      WORDPRESS_DB_PASSWORD: mai1234
    volumes:
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db
    networks:
      - wp-net

networks:
  wp-net:
    driver: bridge